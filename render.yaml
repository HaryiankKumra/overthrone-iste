services:
  - type: web
    name: overthrone
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:railway
    startCommand: pnpm run start:railway
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: overthrone-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: PG_POOL_MAX
        value: "10"
      - key: PG_IDLE_TIMEOUT_MS
        value: "10000"
      - key: PG_CONNECT_TIMEOUT_MS
        value: "5000"
      # Set CORS_ORIGINS to your Render service URL after first deploy,
      # e.g. https://overthrone.onrender.com
      - key: CORS_ORIGINS
        sync: false
      # Supabase — fill in if you use Supabase auth/storage
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_ENABLE_WEBSOCKET
        value: "false"

databases:
  - name: overthrone-db
    databaseName: overthrone
    user: overthrone
    plan: free
